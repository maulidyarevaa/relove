<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barang Tersedia - Relove.id</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/admin/adminPage.css">
</head>
<body data-page="inventory" data-filter="available" data-view="available">
  <main class="admin-shell">
    <nav class="admin-navbar">
      <a class="nav-brand" href="adminPage.html">Relove.id</a>
      <div class="nav-links">
        <a href="adminPage.html">Dashboard</a>
        <a class="active" href="barang-tersedia.html">Barang Tersedia</a>
        <a href="barang-soldout.html">Barang Sold Out</a>
        <a href="barang-terjual.html">Barang Terjual</a>
        <a class="logout-link" href="../login.html">Logout</a>
      </div>
    </nav>

    <header class="detail-page-header">
      <div>
        <p class="page-kicker">Rincian Stok</p>
        <h1>Barang Tersedia</h1>
        <p class="meta-line" id="detailDescription">Barang yang masih tersedia untuk dijual</p>
      </div>
      <span class="detail-counter" id="detailCount">0 barang</span>
    </header>

    <section class="panel">
      <div class="product-grid" id="detailList">
        <article class="empty-state">
          <h3>Belum ada data</h3>
          <p>Barang tersedia akan muncul di halaman ini.</p>
        </article>
      </div>
    </section>
  </main>
  </main>
  <footer class="site-credit-bar">Maulidya Revaa | NIM 2431417039</footer>

  <div class="modal-backdrop" id="productModal" aria-hidden="true">
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="productModalTitle">
      <button class="modal-close" type="button" id="closeProductModal" aria-label="Tutup pop up">&times;</button>
      <p class="page-kicker" id="modalKicker">Edit Barang</p>
      <h2 id="productModalTitle">Edit data barang</h2>

      <form id="productForm" class="product-form">
        <input type="hidden" id="productId">
        <label for="productName">Nama barang</label>
        <input type="text" id="productName">
        <label for="productCategory">Kategori</label>
        <select id="productCategory">
          <option value="">Pilih kategori</option>
          <option value="Baju">Baju</option>
          <option value="Sepatu">Sepatu</option>
          <option value="Tas">Tas</option>
          <option value="Aksesoris">Aksesoris</option>
          <option value="Celana">Celana</option>
          <option value="Lainnya">Lainnya</option>
        </select>
        <label for="productPrice">Harga</label>
        <input type="number" id="productPrice" min="0">
        <label for="productCondition">Kondisi</label>
        <input type="text" id="productCondition">
        <label for="productDescription">Deskripsi personal</label>
        <textarea id="productDescription" rows="4"></textarea>
        <label for="productImage">Upload gambar</label>
        <input type="file" id="productImage" accept="image/*">
        <div class="preview-box">
          <p>Preview gambar</p>
          <img id="imagePreview" src="https://placehold.co/600x420/f5e7db/7f5c50?text=Preview+Gambar" alt="Preview gambar barang">
        </div>
        <p class="form-message" id="formMessage" aria-live="polite"></p>
        <div class="form-actions">
          <button class="primary-button" type="submit">Simpan</button>
          <button class="secondary-button" type="reset" id="resetButton">Reset</button>
        </div>
      </form>
    </section>
  </div>

  <script src="../../script/admin/script.js"></script>
</body>
</html>
